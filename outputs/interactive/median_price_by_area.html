<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8">
  <title>Airbnb NYC - Median Price by Area</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <div id="chart" style="width:100%;height:640px;"></div>
  <script>
    const labels = ["Manhattan","Brooklyn","Staten Island","Queens","Bronx","Unknown"];
    const values = [135,90,75,74,65,0];
    Plotly.newPlot("chart", [{
      type: "bar",
      x: labels,
      y: values,
      marker: { color: ["#2f6f9f", "#d95f02", "#1b9e77", "#7570b3", "#e7298a"] }
    }], {
      title: "Median Price by NYC Borough",
      xaxis: { title: "Area" },
      yaxis: { title: "Median price ($)" }
    }, { responsive: true });
  </script>
</body>
</html>
